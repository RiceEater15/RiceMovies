<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Favorites - RiceMovies</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

  <nav class="navbar scrolled">
    <div class="navbar-left">
      <a href="index.html" class="nav-logo">RiceMovies</a>
      <div class="nav-links">
        <a href="index.html">Discover</a>
        <a href="favorite.html" class="active">Favorites</a>
        <a href="downloads.html">Downloads</a>
      </div>
    </div>
    <div class="navbar-right"></div>
  </nav>

  <div class="content-wrap" style="padding-top: 100px;">
    <h2 style="font-size:1.6rem; font-weight:700; margin-bottom:28px;">
      ❤️ Your Favorites
    </h2>
    <div id="favoritesContainer" class="scroll-track" style="flex-wrap:wrap; overflow-x:visible; gap:12px;"></div>
  </div>

  <script>
    // Navbar scroll effect
    const navbar = document.querySelector('.navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 10);
    });

    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById("favoritesContainer");
      const favorites = JSON.parse(localStorage.getItem("favorites")) || [];

      if (favorites.length === 0) {
        container.style.flexWrap = '';
        container.innerHTML = `
          <p style="color:var(--muted); font-size:1rem; padding: 40px 0;">
            You haven't added any favorites yet.
          </p>`;
        return;
      }

      favorites.forEach(item => {
        const card = document.createElement("div");
        card.className = "movie-card";

        card.innerHTML = `
          <div class="fav-btn" title="Remove from favorites">❤️</div>
          <div class="card-inner">
            <img src="${item.poster}" alt="${item.title}" />
            <div class="card-overlay">
              <div class="card-title-hover">${item.title}</div>
              <div class="card-actions">
                <div class="card-btn play" title="Watch now">
                  <i class="bi bi-play-fill"></i>
                </div>
              </div>
            </div>
          </div>
        `;

        // Remove favorite
        card.querySelector('.fav-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          removeFavorite(item.id);
          card.remove();
          if (container.querySelectorAll('.movie-card').length === 0) {
            container.innerHTML = `
              <p style="color:var(--muted); font-size:1rem; padding: 40px 0;">
                You haven't added any favorites yet.
              </p>`;
          }
        });

        card.addEventListener('click', () => {
          const destination = item.type === "tv"
            ? `tv-watch.html?id=${item.id}&title=${encodeURIComponent(item.title)}&poster=${encodeURIComponent(item.poster)}&overview=&release=`
            : `watch.html?id=${item.id}&title=${encodeURIComponent(item.title)}&poster=${encodeURIComponent(item.poster)}&overview=&release=`;
          window.location.href = destination;
        });

        container.appendChild(card);
      });
    });

    function removeFavorite(id) {
      let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
      favorites = favorites.filter(item => item.id !== id);
      localStorage.setItem("favorites", JSON.stringify(favorites));
    }
  </script>
</body>
</html>
