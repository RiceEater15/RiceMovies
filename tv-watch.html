<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Watch TV Show - RiceMovies</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/tv-watch.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="site-logo"><span>RICE</span><span>MOVIES</span></a>
  <a href="index.html" class="btn-back"><i class="bi bi-arrow-left"></i> Discover</a>
</header>

<main class="main">
  <h1 id="showTitle"></h1>

  <div class="player-wrap">
    <iframe id="player" allowfullscreen webkitallowfullscreen mozallowfullscreen referrerpolicy="no-referrer"></iframe>
  </div>

  <div class="server-bar">
    <span class="server-label">Source:</span>
    <div class="server-pills" id="serverPills"></div>
  </div>

  <div class="episode-controls">
    <div class="ep-top">
      <div class="season-select-wrap">
        <span class="season-label">Season</span>
        <select id="seasonSelect" class="season-select"></select>
      </div>
      <div class="action-row" style="margin:0">
        <button class="btn-action btn-download" id="downloadBtn"><i class="bi bi-download"></i> Download Episode</button>
        <button class="btn-toggle-ep" id="toggleEpisodes"><i class="bi bi-list"></i> Episodes</button>
      </div>
    </div>
    <div class="now-playing">
      <div class="now-playing-text">
        Now Playing - <strong>S<span id="epSeason">1</span> E<span id="episodeNumber">1</span>: <span id="episodeName">Loading...</span></strong>
      </div>
    </div>
    <div class="episode-list" id="episodeList" style="display:none"></div>
  </div>

  <div class="show-details" id="showDetails">
    <div class="show-poster"><img src="" alt="" id="showPoster" /></div>
    <div class="show-text">
      <h2 id="showTitleText"></h2>
      <div class="show-meta" id="showMeta"></div>
      <p class="show-overview" id="showOverview">No overview available.</p>
    </div>
  </div>

  <div class="cast-section">
    <div class="section-header">
      <h3 class="section-title">Cast</h3>
      <button class="btn-toggle" id="toggleCast">Show Cast</button>
    </div>
    <div class="cast-grid" id="actors" style="display:none"></div>
  </div>
</main>

<script src="js/tv-watch.js"></script>

</body>
</html>
