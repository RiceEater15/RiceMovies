<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Watch Movie - RiceMovies</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/watch.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="site-logo"><span>RICE</span><span>MOVIES</span></a>
  <a href="index.html" class="btn-back"><i class="bi bi-arrow-left"></i> Discover</a>
</header>

<main class="main">
  <h1 id="movieTitle"></h1>

  <div class="player-wrap">
    <iframe id="player" allowfullscreen webkitallowfullscreen mozallowfullscreen referrerpolicy="no-referrer" loading="lazy"></iframe>
  </div>

  <div class="server-bar">
    <span class="server-label">Source:</span>
    <div class="server-pills" id="serverPills"></div>
  </div>

  <div class="action-row">
    <button class="btn-action btn-download" id="downloadBtn"><i class="bi bi-download"></i> Download</button>
    <button class="btn-action btn-fav" id="favBtn"><i class="bi bi-heart"></i> Add to Favorites</button>
  </div>

  <div class="movie-details">
    <div class="movie-poster"><img src="" alt="" id="moviePoster" /></div>
    <div class="movie-text">
      <h2 id="movieTitleText"></h2>
      <div class="movie-meta" id="movieMeta"></div>
      <p class="movie-overview" id="movieOverview">No overview available.</p>
    </div>
  </div>

  <div class="cast-section">
    <div class="section-header">
      <h3 class="section-title">Cast</h3>
      <button class="btn-toggle" id="toggleCast">Show Cast</button>
    </div>
    <div class="cast-grid" id="actors" style="display:none"></div>
  </div>
</main>

<script src="js/watch.js"></script>
</body>
</html>
